<!DOCTYPE html>

    <head>
        <meta charset="UTF-8">
        <title>Register Form</title>
    </head>

    <body>
        <form>
            <fieldset>
                <h2>Register Form</h2>

                <label>First Name:</label>
                <input type="text" name="first_name" placeholder="Enter first name" maxlength="5" pattern="[A-Za-z]+" required>
                <br>

                <label>Email:</label>
                <input type="text" name="email" placeholder="example@email.com"
                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
                <br>

                <label>Phone:</label>
                <input type="tel" name="phone" maxlength="11" placeholder="01XXXXXXXXX"
                    pattern="^(010|011|012|015)[0-9]{8}$">
                <br>

                <label>File:</label>
                <input type="file" name="file" accept="image/png">
                <br>

                <label>Courses:</label>
                <input list="courses_list" name="course" placeholder="select a course">
                <datalist id="courses_list">
                    <option value="HTML">
                    <option value="CSS">
                    <option value="JavaScript">
                    <option value="PHP">
                </datalist>
                <br>

                <label>Date:</label>
                <input type="date" name="date" required>
                <br>

                <label>Comment:</label><br>
                <textarea name="comment" placeholder="Write your comment here" required></textarea>
                <br>

                <label>Range (100 : 200):</label>
                <input type="range" name="range" min="100" max="200">
                <br>

                <label>Gender:</label>
                <input type="radio" name="gender" value="male" checked> Male

                <input type="radio" name="gender" value="female"> Female
                <br>

                <label>Tracks:</label><br>
                <input type="checkbox" name="tracks" value="frontend"> Front-End
                <br>

                <input type="checkbox" name="tracks" value="backend"> Back-End
                <br>

                <input type="submit" value="Submit">
                <input type="reset" value="Reset">

            </fieldset>
        </form>

    </body>

</html>
